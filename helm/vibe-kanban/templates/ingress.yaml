{{- if and .Values.relay.enabled .Values.relay.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vibe-kanban.relay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
  annotations:
    {{- with .Values.relay.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.relay.ingress.className | quote }}
  {{- if .Values.relay.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.relay.ingress.host | quote }}
        - {{ printf "*.%s" .Values.relay.ingress.host | quote }}
      secretName: {{ .Values.relay.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.relay.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vibe-kanban.relay.fullname" . }}
                port:
                  name: http
    # Wildcard hostname — routes all *.relay.example.com tunnel traffic
    - host: {{ printf "*.%s" .Values.relay.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vibe-kanban.relay.fullname" . }}
                port:
                  name: http
{{- end }}
