{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None  # headless — StatefulSet pods are addressed directly
  selector:
    {{- include "vibe-kanban.postgres.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
{{- end }}
