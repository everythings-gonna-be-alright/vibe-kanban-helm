apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibe-kanban.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vibe-kanban.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "vibe-kanban.postgres.host" . }} 5432; do
                echo "waiting for postgres…"; sleep 3
              done
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.server.securityContext | nindent 12 }}
          # Inject every key from the credentials secret as an env var.
          envFrom:
            - secretRef:
                name: {{ include "vibe-kanban.secretName" . }}
          env:
            # Non-sensitive config
            - name: RUST_LOG
              value: {{ .Values.server.env.RUST_LOG | quote }}
            - name: SERVER_LISTEN_ADDR
              value: {{ .Values.server.env.SERVER_LISTEN_ADDR | quote }}
            - name: SERVER_PUBLIC_BASE_URL
              value: https://{{ .Values.ingress.host }}
            - name: ELECTRIC_URL
              value: http://{{ include "vibe-kanban.electric.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:3000
            # DB_PASSWORD must appear in env (not only in envFrom) so that the
            # $(DB_PASSWORD) reference below is expanded by the Kubelet.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vibe-kanban.secretName" . }}
                  key: DB_PASSWORD
            - name: SERVER_DATABASE_URL
              value: "postgres://{{ .Values.postgres.username }}:$(DB_PASSWORD)@{{ include "vibe-kanban.postgres.host" . }}:5432/{{ .Values.postgres.database }}"
            - name: VK_TUNNEL
              value: "1"
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # allow up to 2.5 min for migrations on first boot
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
