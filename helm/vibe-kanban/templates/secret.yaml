{{- if not .Values.secrets.existingSecret }}
{{- /* Lookup the existing Secret so upgrades preserve previously generated values. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "vibe-kanban.secretName" .) }}
{{- $jwtSecret := .Values.secrets.jwtSecret
    | default (($existing | dig "data" "VIBEKANBAN_REMOTE_JWT_SECRET" "") | b64dec)
    | default (randBytes 48 | b64enc) }}
{{- $dbPassword := .Values.secrets.dbPassword
    | default (($existing | dig "data" "DB_PASSWORD" "") | b64dec)
    | default (randAlphaNum 32) }}
{{- $electricRolePassword := .Values.secrets.electricRolePassword
    | default (($existing | dig "data" "ELECTRIC_ROLE_PASSWORD" "") | b64dec)
    | default (randAlphaNum 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vibe-kanban.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
type: Opaque
stringData:
  VIBEKANBAN_REMOTE_JWT_SECRET: {{ $jwtSecret | quote }}
  DB_PASSWORD: {{ $dbPassword | quote }}
  ELECTRIC_ROLE_PASSWORD: {{ $electricRolePassword | quote }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.secrets.githubClientId | default "" | quote }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | default "" | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.secrets.googleClientId | default "" | quote }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | default "" | quote }}
  LOOPS_EMAIL_API_KEY: {{ .Values.secrets.loopsEmailApiKey | default "" | quote }}
{{- end }}
