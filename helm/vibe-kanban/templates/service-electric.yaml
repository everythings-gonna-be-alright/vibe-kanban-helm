apiVersion: v1
kind: Service
metadata:
  name: {{ include "vibe-kanban.electric.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: electric
spec:
  type: ClusterIP
  selector:
    {{- include "vibe-kanban.electric.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
    - name: pg-proxy
      port: 65432
      targetPort: pg-proxy
      protocol: TCP
