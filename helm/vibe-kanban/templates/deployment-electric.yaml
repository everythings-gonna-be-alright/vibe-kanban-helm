apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban.electric.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: electric
spec:
  replicas: {{ .Values.electric.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibe-kanban.electric.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "vibe-kanban.electric.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vibe-kanban.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.electric.podSecurityContext | nindent 8 }}
      # Wait for postgres AND the remote-server to be ready.
      # The remote-server must run its migrations first so it can create
      # the electric_sync replication role that ElectricSQL connects as.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "vibe-kanban.postgres.host" . }} 5432; do
                echo "waiting for postgres…"; sleep 3
              done
        - name: wait-for-server
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until wget -qO- http://{{ include "vibe-kanban.server.fullname" . }}:8081/v1/health > /dev/null 2>&1; do
                echo "waiting for remote-server…"; sleep 5
              done
      containers:
        - name: electric
          image: "{{ .Values.electric.image.repository }}:{{ .Values.electric.image.tag }}"
          imagePullPolicy: {{ .Values.electric.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.electric.securityContext | nindent 12 }}
          env:
            - name: ELECTRIC_ROLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vibe-kanban.secretName" . }}
                  key: ELECTRIC_ROLE_PASSWORD
            # Connection URL uses the electric_sync role; its password is appended at runtime
            - name: DATABASE_URL
              value: "postgresql://electric_sync:$(ELECTRIC_ROLE_PASSWORD)@{{ include "vibe-kanban.postgres.host" . }}:5432/{{ .Values.postgres.database }}?sslmode=disable"
            - name: PG_PROXY_PORT
              value: "65432"
            - name: LOGICAL_PUBLISHER_HOST
              value: {{ include "vibe-kanban.electric.fullname" . | quote }}
            - name: AUTH_MODE
              value: "insecure"
            - name: ELECTRIC_INSECURE
              value: "true"
            - name: ELECTRIC_MANUAL_TABLE_PUBLISHING
              value: "true"
            - name: ELECTRIC_USAGE_REPORTING
              value: "false"
            - name: ELECTRIC_FEATURE_FLAGS
              value: "allow_subqueries,tagged_subqueries"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: pg-proxy
              containerPort: 65432
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.electric.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/persistent
      volumes:
        - name: data
          emptyDir: {}
      {{- with .Values.electric.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.electric.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.electric.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
