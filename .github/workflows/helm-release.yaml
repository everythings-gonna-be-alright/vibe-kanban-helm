name: Release Helm Chart

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Push chart as OCI artifact to GHCR
        run: |
          helm package helm/vibe-kanban --destination .cr-release-packages
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          helm push .cr-release-packages/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm registry logout ghcr.io
